<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Notes</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
<script>
// Register formats required in Quill 2 when toolbar:false
const AlignClass = Quill.import('attributors/class/align');
const AlignStyle = Quill.import('attributors/style/align');
Quill.register(AlignClass, true);
Quill.register(AlignStyle, true);
const Header = Quill.import('formats/header');
Quill.register(Header, true);
const Blockquote = Quill.import('formats/blockquote');
Quill.register(Blockquote, true);

// ImageBlock: single non-editable block containing image + caption
const BlockEmbed = Quill.import('blots/block/embed');
class ImageBlock extends BlockEmbed {
  static create(value) {
    const node = super.create();
    node.setAttribute('contenteditable', 'false');
    node.dataset.url = value.url;
    node.dataset.caption = value.caption || '';
    node.style.cssText = 'text-align:center;margin:12px 0;cursor:pointer;-webkit-user-select:none;user-select:none';
    const img = document.createElement('img');
    img.src = value.url;
    img.style.cssText = 'max-width:100%;border-radius:14px;display:block;margin:0 auto';
    node.appendChild(img);
    if (value.caption) {
      const cap = document.createElement('p');
      cap.className = 'img-cap';
      cap.textContent = '(' + value.caption + ')';
      node.appendChild(cap);
    }
    return node;
  }
  static value(node) {
    return { url: node.dataset.url || '', caption: node.dataset.caption || '' };
  }
}
ImageBlock.blotName = 'image-block';
ImageBlock.tagName = 'div';
ImageBlock.className = 'ql-image-block';
Quill.register(ImageBlock, true);
</script>

<style>
:root {
  --bg: #faf9f7; --surface: #f0ede8; --border: #ddd9d2;
  --text: #1a1814; --muted: #8a8480; --accent: #8b6f47;
  --accent-dim: rgba(139,111,71,0.1); --danger: #c0392b;
  --nav-h: 58px; --toolbar-h: 50px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg: #0f0f0f; --surface: #171717; --border: #2a2a2a;
  --text: #e8e4dc; --muted: #555; --accent: #c9b99a;
  --accent-dim: rgba(201,185,154,0.12);
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; height: 100dvh;
  background: var(--bg); color: var(--text);
  font-family: 'Lora', Georgia, serif;
  overflow: hidden;
  transition: background 0.2s, color 0.2s;
}

/* ── AUTH ── */
#auth-screen {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 28px; background: var(--bg); z-index: 100;
}
.auth-mark { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; margin-bottom: 52px; }
.auth-mark em { color: var(--accent); font-style: normal; }
.auth-title { font-size: 26px; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 6px; }
.auth-sub { font-size: 14px; color: var(--muted); font-style: italic; margin-bottom: 44px; }
.auth-form { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 10px; }
.auth-input {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 13px 15px; color: var(--text); font-family: 'DM Mono', monospace;
  font-size: 14px; outline: none; transition: border-color 0.2s; width: 100%;
}
.auth-input:focus { border-color: var(--accent); }
.auth-input::placeholder { color: var(--muted); }
.auth-btn {
  background: var(--accent); color: var(--bg); border: none; border-radius: 8px;
  padding: 14px; font-family: 'DM Mono', monospace; font-size: 12px;
  letter-spacing: 0.1em; cursor: pointer; margin-top: 4px;
}
.auth-btn:disabled { opacity: 0.5; }
.auth-error { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--danger); text-align: center; min-height: 16px; }
.auth-divider { text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); padding: 4px 0; }
.auth-offline-btn {
  background: transparent; border: 1px solid var(--border); border-radius: 8px;
  padding: 12px; color: var(--muted); font-family: 'DM Mono', monospace;
  font-size: 12px; letter-spacing: 0.06em; cursor: pointer;
}

/* ── APP ── */
#app { display: none; flex-direction: column; height: 100%; height: 100dvh; position: relative; }
#app.visible { display: flex; }
.tab-content { flex: 1; overflow: hidden; position: relative; min-height: 0; }
.tab-pane { position: absolute; inset: 0; display: none; flex-direction: column; overflow: hidden; }
.tab-pane.active { display: flex; }

/* ── WRITE TAB ── */
.write-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 100px; position: relative; }

.editor-title-row {
  display: flex; align-items: flex-start;
  padding: 28px 50px 8px 20px; gap: 8px;
}
#editor-title {
  outline: none; font-size: 24px; font-weight: 600; font-family: 'Lora', Georgia, serif;
  color: var(--text); line-height: 1.4; flex: 1;
  min-height: 36px; border: none; background: transparent;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#editor-title:empty::before {
  content: attr(data-placeholder); color: var(--muted); font-style: italic; pointer-events: none; font-weight: 400;
}
#editor-reset-btn {
  background: transparent; border: none; color: var(--muted); cursor: pointer;
  width: 30px; height: 30px; border-radius: 6px; flex-shrink: 0; margin-top: 4px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
#editor-reset-btn:active { background: var(--accent-dim); color: var(--accent); }
.editor-divider { height: 1px; background: var(--border); margin: 4px 20px 0; opacity: 0.6; }

/* Quill editor body */
#quill-container { flex: 1; position: relative; }
.ql-toolbar.ql-snow { display: none !important; }
.ql-container { border: none !important; font-family: 'Lora', Georgia, serif !important; }
.ql-container.ql-snow { border: none !important; }
.ql-editor {
  padding: 16px 52px 40px 20px !important;
  font-size: 16px !important; line-height: 1.8 !important;
  color: var(--text) !important;
  font-family: 'Lora', Georgia, serif !important;
}
.ql-editor.ql-blank::before {
  color: var(--muted) !important; font-style: italic !important;
  font-family: 'Lora', Georgia, serif !important;
  left: 20px !important;
}
.ql-editor p { margin-bottom: 0.4em; }
.ql-editor h1 { font-size: 26px !important; font-weight: 700; line-height: 1.3; margin: 0.6em 0 0.2em; }
.ql-editor h2 { font-size: 21px !important; font-weight: 600; line-height: 1.4; margin: 0.5em 0 0.2em; }
.ql-editor h3 { font-size: 17px !important; font-weight: 600; line-height: 1.4; margin: 0.4em 0 0.2em; }
.ql-editor a { color: var(--accent) !important; text-decoration: underline; text-underline-offset: 3px; }
.ql-editor img { max-width: 100%; border-radius: 8px; margin: 8px 0; display: block; }
.ql-editor figure { margin: 16px auto; text-align: center; display: block; width: 100%; }
.ql-editor figure img { max-width: 100%; border-radius: 14px; display: inline-block; margin: 0 auto; }
.ql-editor figcaption {
  display: block; text-align: center;
  font-style: italic; font-size: 13px;
  color: var(--muted); font-family: 'DM Mono', monospace;
  margin-top: 6px; background: none; border: none;
  padding: 0; border-radius: 0;
}
/* Quill native image */
.ql-editor img {
  max-width: 100%; border-radius: 14px;
  display: block; margin: 8px auto;
  height: auto;
}
/* Image+caption block */
.ql-image-block {
  display: block; text-align: center;
  margin: 16px 0; cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.ql-image-block img {
  max-width: 100%; border-radius: 14px;
  display: block; margin: 0 auto; height: auto;
}
.img-cap {
  text-align: center; font-style: italic;
  font-size: 13px; color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin: 6px 0 0; padding: 0;
  font-weight: normal;
}
.ql-editor blockquote {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 18px 14px 36px;
  margin: 14px auto;
  max-width: 90%;
  text-align: center;
  font-style: italic;
  color: var(--muted);
  position: relative;
}
.ql-editor blockquote::before {
  content: '\201C';
  font-size: 36px;
  color: var(--accent);
  opacity: 0.4;
  line-height: 0;
  position: absolute;
  top: 26px; left: 12px;
  font-family: Georgia, serif;
  pointer-events: none;
}
/* Delete button injected into blockquote */
.ql-bq-delete {
  position: absolute;
  top: 6px; right: 6px;
  width: 20px; height: 20px;
  border: none; border-radius: 50%;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  font-size: 14px; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
[data-theme="light"] .ql-bq-delete, [data-theme="auto"] .ql-bq-delete {
  background: rgba(0,0,0,0.06);
  color: var(--muted);
}
.ql-bq-delete:hover { background: rgba(200,60,60,0.15); color: #c0392b; }
.ql-editor ul[data-checked] li { list-style: none; padding-left: 0; }
.ql-editor ul[data-checked="true"] li::before { content: '☑'; margin-right: 6px; color: var(--accent); }
.ql-editor ul[data-checked="false"] li::before { content: '☐'; margin-right: 6px; color: var(--muted); }
.ql-editor ul, .ql-editor ol { padding-left: 20px; }
.ql-editor .hashtag { color: var(--accent); font-style: italic; border-bottom: 1px dotted var(--accent); cursor: pointer; }

/* ── NOTES TAB ── */
.notes-header {
  padding: 16px 16px 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.notes-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
.notes-header-actions { display: flex; align-items: center; gap: 6px; }
.hdr-btn {
  background: transparent; border: none; color: var(--muted); cursor: pointer;
  width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.hdr-btn:active { background: var(--accent-dim); color: var(--accent); }
.hdr-btn svg { width: 18px; height: 18px; }
.notes-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 14px 24px; }
.note-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 52px 14px 14px; margin-bottom: 8px; cursor: pointer;
  transition: border-color 0.2s; position: relative;
}
.note-card:active { border-color: var(--accent); }
.note-card-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 5px; }
.note-card-title { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-card-untitled { font-style: italic; color: var(--muted); }
.note-card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.tag-pill { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); background: var(--accent-dim); border-radius: 20px; padding: 2px 9px; cursor: pointer; }
.note-card-del {
  position: absolute; top: 50%; right: 12px; transform: translateY(-50%);
  background: transparent; border: none; color: var(--border);
  width: 32px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: color 0.15s, background 0.15s;
}
.note-card-del:active { color: var(--danger); background: rgba(192,57,43,0.1); }
.note-card-del svg { width: 16px; height: 16px; }
.notes-empty { text-align: center; padding: 60px 20px; color: var(--muted); font-style: italic; font-size: 15px; }
.notes-loading { text-align: center; padding: 60px 20px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }

/* ── BOTTOM NAV ── */
/* ── TOP BAR ── */
.app-topbar {
  display: flex; align-items: center; justify-content: flex-end;
  padding: 10px 12px 4px; gap: 4px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.topbar-title {
  flex: 1; font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
}
.topbar-btn {
  width: 36px; height: 36px; background: transparent; border: none;
  color: var(--muted); cursor: pointer; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.topbar-btn:active { background: var(--accent-dim); color: var(--accent); }

/* ── HAMBURGER MENU ── */
#hamburger-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: none; align-items: flex-start; justify-content: flex-end;
}
#hamburger-overlay.visible { display: flex; }
#hamburger-overlay::before {
  content: ''; position: fixed; inset: 0;
  background: rgba(0,0,0,0.3);
}
#hamburger-menu {
  position: relative; z-index: 1;
  background: var(--surface); border-radius: 0 0 0 16px;
  width: 260px; padding: 0 0 20px;
  box-shadow: -4px 4px 24px rgba(0,0,0,0.15);
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
#hamburger-overlay.visible #hamburger-menu { transform: translateX(0); }
.hmenu-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.hmenu-title {
  font-family: 'DM Mono', monospace; font-size: 12px;
  letter-spacing: 0.2em; color: var(--muted);
}
.hmenu-title em { color: var(--accent); font-style: normal; }
#hmenu-close {
  background: transparent; border: none; color: var(--muted);
  cursor: pointer; width: 32px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
#hmenu-close:active { background: var(--accent-dim); }
.hmenu-nav { padding: 6px 8px; }
.hmenu-item {
  display: flex; align-items: center; gap: 12px;
  width: 100%; background: transparent; border: none;
  padding: 12px 10px; border-radius: 10px;
  color: var(--text); cursor: pointer;
  font-family: 'Lora', serif; font-size: 15px;
  text-align: left; transition: background 0.12s;
}
.hmenu-item:active { background: var(--accent-dim); color: var(--accent); }
.hmenu-item svg { color: var(--muted); flex-shrink: 0; }
.hmenu-item.danger { color: var(--danger); }
.hmenu-item.danger svg { color: var(--danger); }
.hmenu-divider { height: 1px; background: var(--border); margin: 4px 16px; }
.hmenu-section-title {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase;
  padding: 8px 18px 2px;
}

/* Remove old bottom nav CSS */
#bottom-nav { display: none; }
#nav-spacer { display: none; }

.nav-btn {
  background: transparent; border: none; color: var(--muted); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 12px 16px 8px; border-radius: 8px; transition: color 0.15s; min-width: 64px;
}
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn span { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.04em; }
.nav-btn.active { color: var(--accent); }
.nav-search {
  width: 46px; height: 46px; background: var(--accent); border: none; border-radius: 50%;
  color: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center;
  margin-top: 6px; flex-shrink: 0; transition: opacity 0.15s;
}
.nav-search:active { opacity: 0.75; }
.nav-search svg { width: 20px; height: 20px; }

/* ── FORMAT BUBBLE ── */
#format-bubble {
  position: fixed;
  background: #1a1814;
  border-radius: 12px;
  padding: 4px 6px;
  display: none;
  flex-direction: row;
  align-items: stretch;
  gap: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
  touch-action: none;
  max-width: calc(100vw - 16px);
  transition: opacity 0.15s;
}
[data-theme="dark"] #format-bubble { background: #f0ede8; }
#format-bubble.visible { display: flex; }
#format-bubble.is-dragging { box-shadow: 0 8px 32px rgba(0,0,0,0.45); }

.fb-rows {
  display: flex; flex-direction: column; gap: 2px;
}
.fb-row {
  display: flex; align-items: center; gap: 1px;
}
.fb-btn {
  min-width: 28px; height: 28px; border: none;
  background: transparent; color: rgba(255,255,255,0.85);
  border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Lora', serif; font-size: 13px;
  transition: background 0.1s; flex-shrink: 0; padding: 0 4px;
  -webkit-user-select: none; user-select: none;
}
[data-theme="dark"] .fb-btn { color: rgba(26,24,20,0.85); }
.fb-btn.is-active { background: rgba(255,255,255,0.2); color: #fff; }
[data-theme="dark"] .fb-btn.is-active { background: rgba(0,0,0,0.12); }
.fb-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.2); margin: 0 2px; flex-shrink: 0; }
[data-theme="dark"] .fb-sep { background: rgba(0,0,0,0.15); }

/* ── INLINE + BUTTON (on empty line) ── */
.ql-inline-btn {
  position: absolute;
  right: 12px;
  width: 26px; height: 26px;
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; line-height: 1;
  transition: border-color 0.15s, color 0.15s, transform 0.2s;
  -webkit-user-select: none; user-select: none;
  pointer-events: auto;
}
.ql-inline-btn:active { border-color: var(--accent); color: var(--accent); }

/* ── BLOCK MENU ── */
#block-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px;
  display: none;
  flex-direction: column;
  gap: 2px;
  z-index: 90;
  box-shadow: var(--shadow);
  min-width: 160px;
  left: 8px; /* default, overridden by JS */
}
#block-menu.visible { display: flex; }
.bm-btn {
  display: flex; align-items: center; gap: 10px;
  background: transparent; border: none;
  padding: 9px 12px; border-radius: 8px;
  color: var(--text); cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 12px;
  text-align: left; width: 100%;
  transition: background 0.12s;
  -webkit-user-select: none; user-select: none;
}
.bm-btn:active { background: var(--accent-dim); color: var(--accent); }
.bm-btn svg { color: var(--muted); flex-shrink: 0; }

/* ── FAB GROUP ── */
#fab-group {
  position: fixed;
  bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
  right: 16px;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  z-index: 25;
}
#fab-group.visible { display: flex; }
.fab-btn {
  width: 42px; height: 42px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  transition: opacity 0.15s, background 0.15s;
  -webkit-user-select: none; user-select: none;
}
.fab-btn:active { opacity: 0.7; }
.fab-save {
  width: 48px; height: 48px;
  background: var(--accent);
  border: none;
  color: var(--bg);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}

/* ── BLOCK DRAG & DROP ── */
.ql-editor > * { position: relative; }
.ql-block-dragging { opacity: 0.35 !important; }
.ql-block-drag-ghost {
  position: fixed; pointer-events: none; z-index: 200;
  background: var(--surface); border-radius: 8px;
  padding: 6px 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  max-width: 80vw; font-family: 'Lora', Georgia, serif;
  font-size: 15px; line-height: 1.6; color: var(--text);
  border: 1.5px solid var(--accent); opacity: 0.9;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ql-drop-line {
  position: fixed; left: 20px; right: 20px; height: 2px;
  background: var(--accent); border-radius: 2px;
  pointer-events: none; z-index: 199;
}

/* ── OVERLAYS ── */
.overlay { position: fixed; inset: 0; background: var(--bg); z-index: 50; display: none; flex-direction: column; }
.overlay.visible { display: flex; }
.overlay-header {
  height: 50px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0;
}
.overlay-back { background: transparent; border: none; color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; padding: 8px 0; }
.overlay-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); flex: 1; text-align: right; }
.search-input-wrap { flex: 1; }
.search-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; color: var(--text);
  font-family: 'Lora', serif; font-size: 16px; outline: none;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); font-style: italic; }
.overlay-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 14px; }
.detail-title { font-size: 22px; font-weight: 600; line-height: 1.4; padding: 24px 20px 12px; font-family: 'Lora', Georgia, serif; }
.detail-divider { height: 1px; background: var(--border); margin: 0 20px 16px; opacity: 0.6; }
.detail-content { font-size: 16px; line-height: 1.8; color: var(--text); padding: 0 20px 24px; font-family: 'Lora', Georgia, serif; }
.detail-content a { color: var(--accent); }
.detail-content strong { font-weight: 600; }
.detail-content em { font-style: italic; }
.detail-content ul, .detail-content ol { padding-left: 20px; margin: 6px 0; }
/* Quill renders ALL lists as <ol> with li[data-list="bullet/ordered/checked/unchecked"] */
.detail-content ol { list-style: none; padding-left: 0; }
.detail-content li[data-list="ordered"] { list-style: decimal; display: list-item; margin-left: 20px; }
.detail-content li[data-list="bullet"]  { list-style: disc;    display: list-item; margin-left: 20px; }
.detail-content li[data-list="checked"]   { list-style: none; display: block; padding-left: 4px; }
.detail-content li[data-list="unchecked"] { list-style: none; display: block; padding-left: 4px; }
.detail-content li[data-list="checked"]::before   { content: '☑ '; color: var(--accent); }
.detail-content li[data-list="unchecked"]::before { content: '☐ '; color: var(--muted); }
.detail-content h1 { font-size: 26px; font-weight: 700; line-height: 1.3; margin: 0.6em 0 0.2em; }
.detail-content h2 { font-size: 21px; font-weight: 600; line-height: 1.4; margin: 0.5em 0 0.2em; }
.detail-content h3 { font-size: 17px; font-weight: 600; line-height: 1.4; margin: 0.4em 0 0.2em; }
.detail-content .hashtag { color: var(--accent); font-style: italic; border-bottom: 1px dotted var(--accent); cursor: pointer; }

/* Blockquote — bubble rounded centered */
.detail-content blockquote {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 18px;
  margin: 14px auto;
  max-width: 90%;
  text-align: center;
  font-style: italic;
  color: var(--muted);
  position: relative;
}
.detail-content blockquote::before {
  content: '\201C';
  font-size: 36px;
  color: var(--accent);
  opacity: 0.4;
  line-height: 0;
  position: absolute;
  top: 22px; left: 12px;
  font-family: Georgia, serif;
}

/* Image — centered, rounded, caption below italic */
.detail-content figure {
  margin: 16px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.detail-content figure img {
  max-width: 100%;
  border-radius: 14px;
  display: block;
}
.detail-content figcaption {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  font-style: italic;
  font-family: 'DM Mono', monospace;
  margin-top: 6px;
  background: none; border: none; padding: 0; border-radius: 0;
}
/* Standalone img (no figure wrapper) */
.detail-content img {
  max-width: 100%;
  border-radius: 14px;
  display: block;
  margin: 12px auto;
}
/* Image block in both editor and view */
.detail-content .ql-image-block,
.ql-editor .ql-image-block {
  text-align: center; margin: 16px 0;
}
.detail-content .ql-image-block img { max-width: 100%; border-radius: 14px; display: block; margin: 0 auto; }
.img-cap {
  text-align: center; font-style: italic;
  font-size: 13px; color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin: 6px 0 0; padding: 0; font-weight: normal;
}

.detail-edit-bar {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 12px 16px calc(12px + var(--safe-bottom));
  display: flex; justify-content: flex-end;
}
.edit-btn {
  background: var(--accent); color: var(--bg); border: none; border-radius: 8px;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em;
  padding: 10px 22px; cursor: pointer;
}

/* ── MODALS ── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-backdrop.visible { display: flex; }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px 20px; width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 14px; }
.modal-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
.modal-msg { font-size: 15px; color: var(--text); line-height: 1.5; }
.modal-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; outline: none; width: 100%; }
.modal-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.mbtn { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.05em; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; }
.mbtn-cancel { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.mbtn-ok { background: var(--accent); color: var(--bg); }
.mbtn-danger { background: var(--danger); color: #fff; }
.img-source-btn {
  display: flex; align-items: center; gap: 10px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
  cursor: pointer; width: 100%; transition: border-color 0.15s;
}
.img-source-btn:active { border-color: var(--accent); color: var(--accent); }
.img-or { text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); padding: 4px 0; }

/* ── PTR ── */
#ptr-indicator {
  position: fixed; top: -48px; left: 50%; transform: translateX(-50%);
  width: 40px; height: 40px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  color: var(--accent); box-shadow: var(--shadow); transition: top 0.2s; z-index: 60; pointer-events: none;
}
#ptr-indicator.visible { top: 16px; }
#ptr-indicator.refreshing #ptr-icon { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
  left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em;
  padding: 9px 18px; border-radius: 20px; box-shadow: var(--shadow);
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; z-index: 200; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>

// Quill: reset B/I/U/S on Enter (new line should start plain)
function initQuill() {
  if (quill) return;
  quill = new Quill('#quill-container', {
    theme: 'snow',
    placeholder: 'Tulis sesuatu... gunakan #hashtag untuk menandai.',
    modules: {
      toolbar: false,
      history: { delay: 1000, maxStack: 200, userOnly: true }
    }
  });

  // Show format bubble on selection, update inline + button on cursor change
  quill.on('selection-change', (range) => {
    if (range && range.length > 0) {
      showFormatBubble(range);
    } else {
      hideFormatBubble();
    }
    updateToolbarState();
    // Update inline btn — use the range from the event directly
    updateInlineBtn(range, true);
  });

  quill.on('text-change', () => {
    saveDraft();
    const bubble = document.getElementById('format-bubble');
    const range = quill.getSelection();
    if (bubble.classList.contains('visible') && range) {
      showFormatBubble(range);
    }
  });

  // Don't override Enter — let Quill handle it natively so selection-change fires properly
  // Instead, detect newline insertion via text-change and reset formats
  quill.on('text-change', (delta, oldDelta, source) => {
    saveDraft();
    injectBlockquoteDeleteBtns();

    // Detect Enter: delta inserts '\n'
    if (source === 'user') {
      const ops = delta.ops || [];
      const hasNewline = ops.some(op => typeof op.insert === 'string' && op.insert.includes('\n'));
      const hasDelete = ops.some(op => op.delete > 0);
      if (hasNewline || hasDelete) {
        setTimeout(() => {
          const r = quill.getSelection();
          if (!r) return;
          if (hasNewline) {
            const f = quill.getFormat(r.index);
            if (f.bold) quill.format('bold', false);
            if (f.italic) quill.format('italic', false);
            if (f.underline) quill.format('underline', false);
            if (f.strike) quill.format('strike', false);
            if (f.header) quill.format('header', false);
            if (f.align) quill.format('align', false); // reset to left
          }
          updateInlineBtn(quill.getSelection(), true);
        }, 0);
      }
    }

    // Refresh bubble if open
    const bubble = document.getElementById('format-bubble');
    const range = quill.getSelection();
    if (bubble.classList.contains('visible') && range) {
      showFormatBubble(range);
    }
  });

  // Load draft
  const draft = localStorage.getItem('notes_draft_body');
  if (draft) {
    try { quill.setContents(JSON.parse(draft)); } catch(e) { quill.root.innerHTML = draft; }
  }
  requestAnimationFrame(injectBlockquoteDeleteBtns);

  // Click image block in editor → open edit modal
  quill.root.addEventListener('click', e => {
    const block = e.target.closest('.ql-image-block');
    if (!block) return;
    e.preventDefault();
    try {
      const blot = Quill.find(block);
      if (!blot) return;
      const val = ImageBlock.value(block);

      document.getElementById('img-caption-input').value = val.caption;
      document.getElementById('imgurl-input').dataset.editImg = 'true';
      document.getElementById('imgurl-input').dataset.editIdx = idx;
      showModal('modal-img');
    } catch(err) {}
  });
}

// ── FORMAT BUBBLE ──
const KEYBOARD_THRESHOLD = 120;
let isOnWriteTab = true;
let blockMenuOpen = false;
let inlineBtnEl = null; // the + button element inside quill container

function showFormatBubble(range) {
  if (!quill) return;
  const bubble = document.getElementById('format-bubble');
  // Get bounding rect of selection
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) { hideFormatBubble(); return; }
  const rect = sel.getRangeAt(0).getBoundingClientRect();
  if (!rect.width) { hideFormatBubble(); return; }

  // Inline formats from Quill
  const f = quill.getFormat();
  document.getElementById('fb-b').classList.toggle('is-active', !!f.bold);
  document.getElementById('fb-i').classList.toggle('is-active', !!f.italic);
  document.getElementById('fb-u').classList.toggle('is-active', !!f.underline);
  document.getElementById('fb-s').classList.toggle('is-active', !!f.strike);

  // Line-level formats: walk up from the selection anchor node to find the block element
  let node = sel && sel.anchorNode ? sel.anchorNode : null;
  // Walk up to find block-level element inside .ql-editor
  while (node && node.nodeType === Node.TEXT_NODE) node = node.parentNode;
  while (node && node.parentNode && !node.parentNode.classList?.contains('ql-editor')) {
    node = node.parentNode;
  }
  const tag = node ? (node.tagName || '').toLowerCase() : '';
  const lineHeader = tag === 'h1' ? 1 : tag === 'h2' ? 2 : tag === 'h3' ? 3 : 0;
  const style = node ? (node.style?.textAlign || '') : '';
  const cls = node ? (node.className || '') : '';
  let lineAlign = null;
  if (style === 'right'   || cls.includes('ql-align-right'))   lineAlign = 'right';
  else if (style === 'center'  || cls.includes('ql-align-center'))  lineAlign = 'center';
  else if (style === 'justify' || cls.includes('ql-align-justify')) lineAlign = 'justify';

  // List: read from parent li/ul/ol
  let lineList = null;
  const liNode = node ? (tag === 'li' ? node : node.closest('li')) : null;
  if (liNode) {
    const dv = liNode.dataset.list || liNode.getAttribute('data-list') || '';
    if (dv === 'bullet') lineList = 'bullet';
    else if (dv === 'ordered') lineList = 'ordered';
    else if (dv === 'checked' || dv === 'unchecked') lineList = 'checklist';
  }

  document.getElementById('fb-h1').classList.toggle('is-active', lineHeader === 1);
  document.getElementById('fb-h2').classList.toggle('is-active', lineHeader === 2);
  document.getElementById('fb-h3').classList.toggle('is-active', lineHeader === 3);
  document.getElementById('fb-p').classList.toggle('is-active', lineHeader === 0);
  document.getElementById('fb-ul').classList.toggle('is-active', lineList === 'bullet');
  document.getElementById('fb-ol').classList.toggle('is-active', lineList === 'ordered');
  document.getElementById('fb-cl').classList.toggle('is-active', lineList === 'checklist');
  // Blockquote: check if current node is inside a blockquote
  const inBq = !!(node && (node.tagName === 'BLOCKQUOTE' || node.closest?.('blockquote')));
  document.getElementById('fb-bq').classList.toggle('is-active', inBq);
  document.getElementById('fb-al').classList.toggle('is-active', lineAlign === null);
  document.getElementById('fb-ac').classList.toggle('is-active', lineAlign === 'center');
  document.getElementById('fb-ar').classList.toggle('is-active', lineAlign === 'right');
  document.getElementById('fb-aj').classList.toggle('is-active', lineAlign === 'justify');

  // Only reposition if bubble is not visible yet (reset on hide)
  if (!bubble.classList.contains('visible')) {
    bubble.classList.add('visible');
    requestAnimationFrame(() => {
      const bw = bubble.offsetWidth;
      const bh = bubble.offsetHeight;
      let left = rect.left + rect.width / 2 - bw / 2;
      left = Math.max(8, Math.min(left, window.innerWidth - bw - 8));
      let top = rect.bottom + 10;
      if (top + bh > window.innerHeight - 8) top = rect.top - bh - 10;
      if (top < 8) top = rect.bottom + 10;
      bubble.style.left = left + 'px';
      bubble.style.top = top + 'px';
      bubble.style.transform = 'none';
    });
  } else {
    bubble.classList.add('visible');
  }
}

function hideFormatBubble() {
  document.getElementById('format-bubble').classList.remove('visible');
  // Reset position on hide so next show re-positions near selection
  const b = document.getElementById('format-bubble');
  b.style.left = '';
  b.style.top = '';
}

// ── DRAG & DROP for bubble — long press anywhere on bubble ──
(function() {
  const bubble = document.getElementById('format-bubble');
  let dragging = false, longPressTimer = null;
  let startX, startY, origLeft, origTop;

  function onStart(cx, cy) {
    dragging = true;
    startX = cx; startY = cy;
    origLeft = parseInt(bubble.style.left) || bubble.getBoundingClientRect().left;
    origTop  = parseInt(bubble.style.top)  || bubble.getBoundingClientRect().top;
    bubble.style.transform = 'none';
    bubble.style.opacity = '0.85';
  }
  function onMove(cx, cy) {
    if (!dragging) return;
    const dx = cx - startX, dy = cy - startY;
    const bw = bubble.offsetWidth, bh = bubble.offsetHeight;
    const newLeft = Math.max(0, Math.min(origLeft + dx, window.innerWidth - bw));
    const newTop  = Math.max(0, Math.min(origTop + dy, window.innerHeight - bh));
    bubble.style.left = newLeft + 'px';
    bubble.style.top  = newTop  + 'px';
  }
  function onEnd() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    dragging = false;
    bubble.style.opacity = '1';
    bubble.classList.remove('is-dragging');
  }

  // Desktop: mousedown on bubble background (not buttons)
  bubble.addEventListener('mousedown', e => {
    if (e.target.closest('.fb-btn, .fb-sep')) return;
    e.preventDefault();
    onStart(e.clientX, e.clientY);
  });
  document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  document.addEventListener('mouseup', onEnd);

  // Mobile: long press 400ms to activate drag
  bubble.addEventListener('touchstart', e => {
    const t = e.touches[0];
    longPressTimer = setTimeout(() => {
      longPressTimer = null;
      bubble.classList.add('is-dragging');
      onStart(t.clientX, t.clientY);
    }, 400);
  }, { passive: true });

  bubble.addEventListener('touchmove', e => {
    if (longPressTimer) {
      // Moved before long press — cancel drag intent
      clearTimeout(longPressTimer);
      longPressTimer = null;
    }
    if (dragging) {
      e.preventDefault();
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: false });

  bubble.addEventListener('touchend', onEnd);
  bubble.addEventListener('touchcancel', onEnd);
})();

// Format bubble button handler — mousedown preventDefault keeps focus
function fbHandler(id, fn) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('mousedown', e => { e.preventDefault(); fn(); });
  let sx = 0, sy = 0, tf = false;
  el.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; tf = false; }, { passive: true });
  el.addEventListener('touchend', e => {
    const dx = Math.abs(e.changedTouches[0].clientX - sx);
    const dy = Math.abs(e.changedTouches[0].clientY - sy);
    if (dx < 8 && dy < 8) { e.preventDefault(); tf = true; fn(); }
  }, { passive: false });
  el.addEventListener('click', () => { if (tf) { tf = false; return; } fn(); });
}

function refreshBubble() {
  const range = quill ? quill.getSelection() : null;
  if (range) showFormatBubble(range);
}

// Inject a × delete button into every blockquote in the editor
function injectBlockquoteDeleteBtns() {
  if (!quill) return;
  quill.root.querySelectorAll('blockquote').forEach(bq => {
    if (bq.querySelector('.ql-bq-delete')) return; // already injected
    const btn = document.createElement('button');
    btn.className = 'ql-bq-delete';
    btn.innerHTML = '×';
    btn.title = 'Hapus kutipan';
    btn.addEventListener('mousedown', e => {
      e.preventDefault();
      // Find Quill index of this blockquote and remove blockquote format
      const blot = Quill.find(bq);
      if (blot) {
        const index = quill.getIndex(blot);
        const length = bq.textContent.length;
        quill.setSelection(index, length);
        quill.format('blockquote', false);
      }
    });
    bq.appendChild(btn);
  });
}

// ── BLOCK DRAG & DROP ──
(function() {
  let dragEl = null, ghost = null, dropLine = null;
  let longPressTimer = null, dragActive = false;
  let startY = 0, startX = 0;

  function getBlocks() {
    if (!quill) return [];
    return Array.from(quill.root.children).filter(el => el.nodeType === 1);
  }

  function createGhost(el) {
    const g = document.createElement('div');
    g.className = 'ql-block-drag-ghost';
    g.textContent = el.textContent.trim().slice(0, 60) || '(blok kosong)';
    document.body.appendChild(g);
    return g;
  }

  function createDropLine() {
    const l = document.createElement('div');
    l.className = 'ql-drop-line';
    document.body.appendChild(l);
    return l;
  }

  function getDropTarget(clientY) {
    const blocks = getBlocks();
    for (let i = 0; i < blocks.length; i++) {
      const r = blocks[i].getBoundingClientRect();
      const mid = r.top + r.height / 2;
      if (clientY < mid) return { before: blocks[i], index: i };
    }
    return { before: null, index: blocks.length };
  }

  function startDrag(el, cx, cy) {
    dragActive = true;
    dragEl = el;
    el.classList.add('ql-block-dragging');
    ghost = createGhost(el);
    dropLine = createDropLine();
    moveAt(cx, cy);
    // Blur quill so keyboard closes
    if (quill) quill.blur();
  }

  function moveAt(cx, cy) {
    if (!dragActive) return;
    if (ghost) {
      ghost.style.left = Math.max(8, cx - ghost.offsetWidth / 2) + 'px';
      ghost.style.top  = (cy - 20) + 'px';
    }
    const dt = getDropTarget(cy);
    if (dropLine) {
      if (dt.before) {
        const r = dt.before.getBoundingClientRect();
        dropLine.style.top = (r.top - 2) + 'px';
        dropLine.style.display = 'block';
      } else {
        const blocks = getBlocks();
        if (blocks.length) {
          const r = blocks[blocks.length - 1].getBoundingClientRect();
          dropLine.style.top = (r.bottom + 2) + 'px';
          dropLine.style.display = 'block';
        }
      }
    }
  }

  function endDrag(cy) {
    if (!dragActive || !dragEl) return cleanup();
    const dt = getDropTarget(cy);
    const blocks = getBlocks();
    const fromIdx = blocks.indexOf(dragEl);
    const toIdx = dt.index;

    if (fromIdx !== -1 && fromIdx !== toIdx && fromIdx !== toIdx - 1) {
      // Move DOM node
      if (dt.before) {
        quill.root.insertBefore(dragEl, dt.before);
      } else {
        quill.root.appendChild(dragEl);
      }
      // Sync Quill internal state
      quill.update();
      saveDraft();
    }
    cleanup();
  }

  function cleanup() {
    dragActive = false;
    if (dragEl) { dragEl.classList.remove('ql-block-dragging'); dragEl = null; }
    if (ghost) { ghost.remove(); ghost = null; }
    if (dropLine) { dropLine.remove(); dropLine = null; }
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  }

  // Touch events on editor
  document.addEventListener('touchstart', e => {
    if (!quill || !isOnWriteTab) return;
    const target = e.target.closest('.ql-editor > *');
    if (!target || target.closest('#format-bubble')) return;
    // Skip if touching a button (blockquote delete, image block)
    if (e.target.closest('button, .ql-bq-delete')) return;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    longPressTimer = setTimeout(() => {
      longPressTimer = null;
      startDrag(target, startX, startY);
    }, 500);
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const dx = Math.abs(t.clientX - startX);
    const dy = Math.abs(t.clientY - startY);
    if (longPressTimer && (dx > 10 || dy > 10)) {
      clearTimeout(longPressTimer); longPressTimer = null;
    }
    if (dragActive) {
      e.preventDefault();
      moveAt(t.clientX, t.clientY);
    }
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    if (dragActive) endDrag(e.changedTouches[0].clientY);
  });

  document.addEventListener('touchcancel', cleanup);
})();

function fmtToggle(format, value) {
  if (!quill) return;
  const f = quill.getFormat();
  if (format === 'underline' && !f.underline && f.strike) quill.format('strike', false);
  if (format === 'strike' && !f.strike && f.underline) quill.format('underline', false);
  quill.format(format, value !== undefined ? value : !f[format]);
  // Use requestAnimationFrame so DOM has updated before we read it
  requestAnimationFrame(refreshBubble);
}

// ── INLINE + BUTTON ──
function updateInlineBtn(range, immediate) {
  if (!quill || !isOnWriteTab) return;
  if (!range || range.length > 0) { removeInlineBtn(); return; }
  const [line] = quill.getLine(range.index);
  if (!line) { removeInlineBtn(); return; }
  const lineText = line.domNode ? line.domNode.textContent : '';
  if (lineText.trim() !== '') { removeInlineBtn(); return; }

  if (!inlineBtnEl) {
    inlineBtnEl = document.createElement('button');
    inlineBtnEl.className = 'ql-inline-btn';
    inlineBtnEl.textContent = '+';
    inlineBtnEl.addEventListener('mousedown', e => { e.preventDefault(); toggleBlockMenu(inlineBtnEl); });
    inlineBtnEl.addEventListener('touchend', e => { e.preventDefault(); toggleBlockMenu(inlineBtnEl); }, { passive: false });
    document.getElementById('quill-container').appendChild(inlineBtnEl);
  }

  const positionBtn = () => {
    const lineBounds = quill.getBounds(range.index);
    if (!lineBounds) { removeInlineBtn(); return; }
    const editorRect = document.querySelector('.ql-editor').getBoundingClientRect();
    const containerRect = document.getElementById('quill-container').getBoundingClientRect();
    const top = lineBounds.top + (editorRect.top - containerRect.top) - 1;
    inlineBtnEl.style.top = top + 'px';
    inlineBtnEl.style.display = 'flex';
  };

  if (immediate) {
    positionBtn();
  } else {
    requestAnimationFrame(positionBtn);
  }
}

function removeInlineBtn() {
  if (inlineBtnEl) inlineBtnEl.style.display = 'none';
  closeBlockMenu();
}

// ── BLOCK MENU ──
function toggleBlockMenu(anchor) {
  const menu = document.getElementById('block-menu');
  if (blockMenuOpen) { closeBlockMenu(); return; }
  blockMenuOpen = true;
  menu.classList.add('visible');
  // Position: show to the left of the + button, clamped to screen
  requestAnimationFrame(() => {
    const rect = anchor.getBoundingClientRect();
    const mw = menu.offsetWidth;
    const mh = menu.offsetHeight;
    // Try left of button first
    let left = rect.left - mw - 8;
    if (left < 8) left = 8; // clamp to left edge
    // Try above button, if not enough room go below
    let top = rect.top;
    if (top + mh > window.innerHeight - 8) top = window.innerHeight - mh - 8;
    if (top < 8) top = 8;
    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
    menu.style.right = 'auto';
  });
}

function closeBlockMenu() {
  blockMenuOpen = false;
  document.getElementById('block-menu').classList.remove('visible');
  if (inlineBtnEl) inlineBtnEl.classList.remove('open');
}

// Close block menu on tap outside
document.addEventListener('touchstart', e => {
  if (blockMenuOpen && !e.target.closest('#block-menu') && !e.target.closest('.ql-inline-btn')) closeBlockMenu();
}, { passive: true });
document.addEventListener('mousedown', e => {
  if (blockMenuOpen && !e.target.closest('#block-menu') && !e.target.closest('.ql-inline-btn')) closeBlockMenu();
});

function blockMenuAction(fn) {
  closeBlockMenu();
  if (!quill) return;

  fn(range.index);
}

async function doSave() {
  if (!currentUser || !quill) return;
  const title = document.getElementById('editor-title').innerText.trim();
  const content = quill.root.innerHTML.trim();
  if (!title && (!content || content === '<p><br></p>')) { toast('Catatan kosong'); return; }
  document.getElementById('save-fab').style.opacity = '0.4';
  const tags = extractTags(content);

  if (isOfflineMode) {
    if (editingNoteId) {
      // UPDATE catatan offline
      const idx = offlineNotes.findIndex(n => n.id === editingNoteId);
      if (idx >= 0) {
        offlineNotes[idx] = { ...offlineNotes[idx], title: title || null, content, tags, updated_at: new Date().toISOString() };
      } else {
        offlineNotes.unshift({ id: editingNoteId, title: title || null, content, tags, created_at: new Date().toISOString(), updated_at: new Date().toISOString() });
      }
    } else {
      offlineNotes.unshift({ id: Date.now().toString(), title: title || null, content, tags, created_at: new Date().toISOString(), updated_at: new Date().toISOString() });
    }
    saveOfflineNotes();
    document.getElementById('save-fab').style.opacity = '1';
    toast('Disimpan ✦');
    renderOfflineNotes();
  } else {
    let error;
    if (editingNoteId) {
      // UPDATE — tidak buat duplikat
      ({ error } = await sb.from('notes').update({ content, tags, title: title || null, updated_at: new Date().toISOString() }).eq('id', editingNoteId));
    } else {
      // INSERT baru
      ({ error } = await sb.from('notes').insert({ user_id: currentUser.id, content, tags, title: title || null }));
    }
    document.getElementById('save-fab').style.opacity = '1';
    if (error) { toast('Gagal menyimpan'); return; }
    toast('Disimpan ✦');
    loadNotes();
  }
  // Reset editing state & draft setelah simpan
  editingNoteId = null;
  clearDraft();
}

async function loadNotes() {
  if (isOfflineMode) { renderOfflineNotes(); return; }
  const listEl = document.getElementById('notes-list');
  listEl.innerHTML = '<div class="notes-loading">memuat...</div>';

}

function renderNotes(notes, container) {
  if (!notes.length) { container.innerHTML = '<div class="notes-empty">Belum ada catatan.</div>'; return; }
  container.innerHTML = notes.map(n => `
    <div class="note-card" data-id="${n.id}">
      <div class="note-card-date">${fmtDate(n.created_at)}</div>
      <div class="note-card-title ${!n.title ? 'note-card-untitled' : ''}">${n.title ? escHtml(n.title) : 'Tanpa judul'}</div>
      ${n.tags?.length ? `<div class="note-card-tags">${n.tags.map(t=>`<span class="tag-pill" data-tag="${t}">${t}</span>`).join('')}</div>` : ''}
      <button class="note-card-del" data-id="${n.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  `).join('');

  container.querySelectorAll('.note-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.note-card-del')) return;
      if (e.target.closest('.tag-pill')) { openHashtagFilter(e.target.dataset.tag); return; }
      const note = allNotes.find(n => n.id === card.dataset.id);
      if (note) openDetail(note);
    });
  });
  container.querySelectorAll('.note-card-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      pendingDeleteId = btn.dataset.id;
      showModal('modal-delete');
    });
  });
}

document.getElementById('del-cancel').addEventListener('click', () => { pendingDeleteId = null; hideModal('modal-delete'); });
document.getElementById('del-confirm').addEventListener('click', async () => {
  if (!pendingDeleteId) return;
  hideModal('modal-delete');
  if (isOfflineMode) {
    offlineNotes = offlineNotes.filter(n => n.id !== pendingDeleteId);
    saveOfflineNotes(); pendingDeleteId = null; renderOfflineNotes(); toast('Dihapus');
  } else {
    const { error } = await sb.from('notes').delete().eq('id', pendingDeleteId);
    pendingDeleteId = null;
    if (error) { toast('Gagal menghapus'); return; }
    toast('Dihapus'); loadNotes();
  }
});

// ── DETAIL ──
function renderWithHashtags(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  walkNodes(div);
  return div.innerHTML;
}
function walkNodes(node) {
  if (node.nodeType === Node.TEXT_NODE) {
    if (!/#[\w\u00C0-\u024F]+/.test(node.textContent)) return;
    const span = document.createElement('span');
    span.innerHTML = node.textContent.replace(/#([\w\u00C0-\u024F]+)/g, (m, t) => `<a class="hashtag" data-tag="${t.toLowerCase()}">${m}</a>`);
    node.parentNode.replaceChild(span, node);
  } else if (node.nodeName !== 'A' && node.nodeName !== 'SCRIPT') {
    Array.from(node.childNodes).forEach(walkNodes);
  }
}
document.addEventListener('click', e => {
  const link = e.target.closest('.hashtag');
  if (link) { e.preventDefault(); openHashtagFilter(link.dataset.tag); }
});

function openDetail(note) {
  currentDetailNote = note;
  document.getElementById('detail-date').textContent = fmtDate(note.created_at);
  document.getElementById('detail-title-el').textContent = note.title || 'Tanpa judul';
  document.getElementById('detail-body').innerHTML = renderWithHashtags(note.content || '');
  document.getElementById('detail-overlay').classList.add('visible');
  document.getElementById('detail-scroll').scrollTop = 0;
  history.pushState({ overlay: 'detail' }, '');
}
document.getElementById('detail-back').addEventListener('click', () => {
  history.back(); // triggers popstate which closes overlay
});
document.getElementById('detail-edit-btn').addEventListener('click', () => {
  if (!currentDetailNote || !quill) return;
  const note = currentDetailNote;
  document.getElementById('editor-title').innerHTML = note.title ? escHtml(note.title) : '';
  quill.root.innerHTML = note.content || '';
  quill.update();
  editingNoteId = note.id;
  saveDraft();
  document.getElementById('detail-overlay').classList.remove('visible');
  currentDetailNote = null;
  history.back();
  switchTab('write');
  toast('Edit catatan, simpan jika selesai');
});

// ── HASHTAG FILTER ──
document.getElementById('hashtag-back').addEventListener('click', () => history.back());
function openHashtagFilter(tag) {
  const filtered = allNotes.filter(n => n.tags?.includes(tag));
  document.getElementById('hashtag-label').textContent = '#' + tag;
  const el = document.getElementById('hashtag-results');
  if (!filtered.length) { el.innerHTML = '<div class="notes-empty">Tidak ada catatan.</div>'; }
  else {
    el.innerHTML = filtered.map(n => `
      <div class="note-card" data-id="${n.id}" style="padding-right:14px">
        <div class="note-card-date">${fmtDate(n.created_at)}</div>
        <div class="note-card-title ${!n.title ? 'note-card-untitled' : ''}">${n.title ? escHtml(n.title) : 'Tanpa judul'}</div>
        ${n.tags?.length ? `<div class="note-card-tags">${n.tags.map(t=>`<span class="tag-pill">${t}</span>`).join('')}</div>` : ''}
      </div>
    `).join('');
    el.querySelectorAll('.note-card').forEach(card => {
      card.addEventListener('click', () => {
        const note = allNotes.find(n => n.id === card.dataset.id);
        if (note) { document.getElementById('hashtag-overlay').classList.remove('visible'); openDetail(note); }
      });
    });
  }
  document.getElementById('hashtag-overlay').classList.add('visible');
  history.pushState({ overlay: 'hashtag' }, '');
}

// ── BACK GESTURE (popstate) ──
// Handles Android swipe-back gesture and hardware back button in PWA
window.addEventListener('popstate', (e) => {
  // Close hamburger menu
  if (document.getElementById('hamburger-overlay').classList.contains('visible')) {
    closeHMenu();
    return;
  }
  // Close detail overlay
  if (document.getElementById('detail-overlay').classList.contains('visible')) {
    document.getElementById('detail-overlay').classList.remove('visible');
    currentDetailNote = null;
    return;
  }
  // Close hashtag overlay
  if (document.getElementById('hashtag-overlay').classList.contains('visible')) {
    document.getElementById('hashtag-overlay').classList.remove('visible');
    return;
  }
  // Close search overlay
  if (document.getElementById('search-overlay').classList.contains('visible')) {
    document.getElementById('search-overlay').classList.remove('visible');
    document.getElementById('search-input').value = '';
    return;
  }
  // Close any open modal
  document.querySelectorAll('.modal-backdrop.visible').forEach(m => m.classList.remove('visible'));
});

// Push a base state on load so first back doesn't exit app
window.addEventListener('load', () => {
  if (!history.state) history.replaceState({ base: true }, '');
});

// Old nav-write/nav-notes kept for compatibility but inactive
document.getElementById('nav-write')?.addEventListener('click', () => switchTab('write'));

function switchTab(tab) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  isOnWriteTab = tab === 'write';
  if (tab === 'write') {
    document.getElementById('fab-group').classList.add('visible');
  } else {
    document.getElementById('fab-group').classList.remove('visible');
    hideFormatBubble();
    removeInlineBtn();
    closeBlockMenu();
  }
}

// ── SEARCH ──
document.getElementById('search-close').addEventListener('click', () => history.back());
document.getElementById('search-input').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  const el = document.getElementById('search-results');
  if (!q) { el.innerHTML = ''; return; }
  const filtered = allNotes.filter(n => {
    const text = stripHtml(n.content || '').toLowerCase();
    const title = (n.title || '').toLowerCase();
    if (q.startsWith('#')) return n.tags?.some(t => t.includes(q));
    return title.includes(q) || text.includes(q) || n.tags?.some(t => t.includes(q));
  });
  if (!filtered.length) { el.innerHTML = '<div class="notes-empty">Tidak ditemukan.</div>'; return; }
  el.innerHTML = filtered.map(n => `
    <div class="note-card" data-id="${n.id}" style="padding-right:14px">
      <div class="note-card-date">${fmtDate(n.created_at)}</div>
      <div class="note-card-title ${!n.title ? 'note-card-untitled' : ''}">${n.title ? escHtml(n.title) : 'Tanpa judul'}</div>
      ${n.tags?.length ? `<div class="note-card-tags">${n.tags.map(t=>`<span class="tag-pill">${t}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');
  el.querySelectorAll('.note-card').forEach(card => {
    card.addEventListener('click', () => {
      const note = allNotes.find(n => n.id === card.dataset.id);
      if (note) { document.getElementById('search-overlay').classList.remove('visible'); openDetail(note); }
    });
  });
});

// ── PULL TO REFRESH ──
(function() {
  const tabNotes = document.getElementById('tab-notes');
  const notesList = document.getElementById('notes-list');
  const ptr = document.getElementById('ptr-indicator');
  const THRESHOLD = 70;
  let startY = 0, pulling = false, curY = 0;
  tabNotes.addEventListener('touchstart', e => { if (notesList.scrollTop > 0) return; startY = e.touches[0].clientY; pulling = true; }, { passive: true });
  tabNotes.addEventListener('touchmove', e => {
    if (!pulling) return; curY = e.touches[0].clientY;
    if (curY - startY > 10 && notesList.scrollTop === 0) { ptr.classList.add('visible'); document.getElementById('ptr-icon').style.transform = `rotate(${Math.min((curY-startY)/THRESHOLD,1)*360}deg)`; }
  }, { passive: true });
  tabNotes.addEventListener('touchend', async () => {
    if (!pulling) return; pulling = false;
    if (curY - startY > THRESHOLD && notesList.scrollTop === 0) {
      ptr.classList.add('refreshing'); await loadNotes(); ptr.classList.remove('refreshing');
    }
    ptr.classList.remove('visible'); document.getElementById('ptr-icon').style.transform = ''; startY = 0; curY = 0;
  });
})();

// Modal backdrop clicks
document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) { el.classList.remove('visible'); pendingDeleteId = null; } });
});
